name: Update RSS feeds

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate feeds
        run: python generate_feeds.py
      - name: Commit updated feeds when needed
        run: |
          if git diff --quiet; then
            echo "No feed changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seen.json docs/*.xml
          git commit -m "Update Fragrantica feeds"
          git push
